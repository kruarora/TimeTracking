<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#12162a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="robots" content="noindex">
<title>Lamplight</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8C%99%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500;1,9..144,600&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  /* ============ DESIGN TOKENS ============ */
  :root{
    --bg:#12162a;
    --bg-deep:#0a0d1a;
    --surface:#1c2342;
    --surface-2:#222a4d;
    --line:#2c335a;
    --text:#f3efe7;
    --muted:#9aa0c4;
    --correct:#6f9c80;
    --present:#e3ad62;
    --present-deep:#c98f46;
    --absent:#363c63;
    --accent:#e3ad62;
    --accent-deep:#c98f46;
    --danger:#c97a6a;
    --font-display:'Fraunces', serif;
    --font-body:'Inter', sans-serif;
    --font-mono:'IBM Plex Mono', monospace;
  }

  *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  html,body{ margin:0; height:100%; }
  body{
    background:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(227,173,98,0.10), transparent 60%),
      radial-gradient(ellipse 100% 60% at 50% 110%, rgba(0,0,0,0.35), transparent),
      var(--bg);
    color:var(--text);
    font-family:var(--font-body);
    min-height:100vh; /* Fallback for older iOS */
    min-height:100dvh;
    padding-bottom: env(safe-area-inset-bottom);
  }
  button, input{ font-family:inherit; }
  button{ appearance:none; }
  :focus-visible{ outline:2px solid var(--accent); outline-offset:2px; border-radius:4px; }
  a{ color:var(--accent); }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:0.001ms !important; animation-iteration-count:1 !important; transition-duration:0.001ms !important; }
  }

  /* ============ LAYOUT ============ */
  .screen{ 
    max-width:480px; margin:0 auto; padding:0 16px 32px; 
    min-height:100vh; /* Fallback for older iOS */
    min-height:100dvh; 
    display:flex; flex-direction:column; 
  }

  /* ---- brand / header ---- */
  .brand{ text-align:center; margin-top:34px; }
  .brand-mark{ color:var(--accent); filter: drop-shadow(0 0 16px rgba(227,173,98,0.45)); margin-bottom:2px; }
  .brand h1{
    font-family:var(--font-display); font-style:italic; font-weight:600;
    font-size:2.1rem; margin:0; letter-spacing:0.3px;
    text-shadow:0 0 26px rgba(227,173,98,0.25);
  }
  .brand .tagline{ color:var(--muted); font-size:0.85rem; margin:6px 0 0; }
  .date-stamp{
    font-family:var(--font-mono); color:var(--muted); font-size:0.78rem;
    text-align:center; margin-top:14px; text-transform:uppercase; letter-spacing:0.12em;
  }

  /* ---- board ---- */
  .board{ display:flex; flex-direction:column; gap:8px; margin:28px auto 6px; width:100%; max-width:420px; }
  .row{ display:grid; grid-template-columns:repeat(var(--len), 1fr); gap:7px; transition: filter .25s; }
  .row.active{ filter: drop-shadow(0 0 16px rgba(227,173,98,0.35)); }
  .row.shake{ animation: shake .4s; }
  @keyframes shake{
    10%,90%{ transform:translateX(-3px); } 20%,80%{ transform:translateX(4px); }
    30%,50%,70%{ transform:translateX(-6px); } 40%,60%{ transform:translateX(6px); }
  }
  .tile{
    aspect-ratio:1/1; display:flex; align-items:center; justify-content:center;
    font-family:var(--font-display); font-weight:600; text-transform:uppercase;
    border:2px solid var(--line); border-radius:9px; background:var(--surface);
    color:var(--text); transition: transform .12s, background .2s, border-color .2s;
  }
  .tile.filled{ border-color:var(--muted); transform:scale(1.02); }
  .tile.pop{ animation: pop .42s ease; }
  @keyframes pop{
    0%{ transform:scale(1); } 35%{ transform:scale(1.12) rotateX(8deg); } 100%{ transform:scale(1); }
  }
  .tile.correct{ background:var(--correct); border-color:var(--correct); color:#0e1b14; }
  .tile.present{ background:var(--present); border-color:var(--present); color:#231505; }
  .tile.absent{ background:var(--absent); border-color:var(--absent); color:var(--muted); }

  .board-wrap.win-flash{ animation: glow-pulse 1.1s ease; }
  @keyframes glow-pulse{
    0%{ filter:none; } 40%{ filter: drop-shadow(0 0 22px rgba(111,156,128,0.55)); } 100%{ filter:none; }
  }

  /* ---- banner ---- */
  .banner{
    text-align:center; margin:4px auto 18px; max-width:420px; width:100%;
    padding:0.85rem 1.1rem; border-radius:12px; background:var(--surface);
    border:1px solid var(--line); font-size:0.92rem; line-height:1.5;
  }
  .banner.win{ border-color:var(--correct); box-shadow:0 0 24px rgba(111,156,128,0.18); }
  .banner.lose{ border-color:var(--danger); }
  .banner strong{ font-family:var(--font-display); font-style:italic; color:var(--accent); letter-spacing:0.5px; }

  /* ---- keyboard ---- */
  .keyboard{ display:flex; flex-direction:column; gap:7px; margin-top:auto; padding-top:18px; }
  .kb-row{ display:flex; gap:5px; justify-content:center; }
  .key{
    flex:1; max-width:38px; height:50px; border-radius:7px; background:var(--surface-2);
    border:none; color:var(--text); font-weight:600; font-size:0.85rem;
    display:flex; align-items:center; justify-content:center; cursor:pointer;
    transition: background .15s, transform .08s;
  }
  .key:active{ transform:scale(0.93); }
  .key.wide{ max-width:58px; font-size:0.68rem; letter-spacing:0.03em; }
  .key.correct{ background:var(--correct); color:#0e1b14; }
  .key.present{ background:var(--present); color:#231505; }
  .key.absent{ background:var(--absent); color:var(--muted); }

  /* ---- empty / setup states ---- */
  .empty-card, .setup-card{ text-align:center; margin:auto; max-width:320px; padding:2rem 1.2rem; }
  .empty-card .glyph, .setup-card .glyph{ font-size:2rem; opacity:0.6; margin-bottom:10px; }
  .empty-card h2, .setup-card h2{ font-family:var(--font-display); font-style:italic; font-weight:600; font-size:1.4rem; margin:0 0 8px; }
  .empty-card p, .setup-card p{ color:var(--muted); font-size:0.92rem; line-height:1.6; margin:0; }
  .setup-card{ text-align:left; max-width:520px; }
  .setup-card pre{ background:var(--surface); border:1px solid var(--line); border-radius:8px; padding:10px 12px; font-size:0.78rem; overflow-x:auto; font-family:var(--font-mono); }

  /* ---- footer link ---- */
  .footer-link{
    position:fixed; bottom:12px; right:14px; background:none; border:none;
    color:var(--muted); opacity:0.32; font-size:1.05rem; cursor:pointer; padding:8px;
  }
  .footer-link:hover, .footer-link:focus-visible{ opacity:0.85; }

  /* ============ ADMIN ============ */
  .admin-header{ display:flex; justify-content:space-between; align-items:baseline; margin:30px 0 22px; }
  .admin-header h1{ font-family:var(--font-display); font-style:italic; font-weight:600; font-size:1.55rem; margin:0; }
  .link-btn{ background:none; border:none; color:var(--muted); font-size:0.85rem; cursor:pointer; font-family:var(--font-body); }
  .link-btn:hover{ color:var(--text); }

  .login-card{ max-width:340px; margin:64px auto; padding:2rem 1.6rem; background:var(--surface); border:1px solid var(--line); border-radius:14px; }
  .login-card h2{ font-family:var(--font-display); font-style:italic; font-weight:600; margin:0 0 18px; font-size:1.4rem; text-align:center; }

  .field{ display:flex; flex-direction:column; gap:6px; margin-bottom:16px; }
  .field-label{ font-family:var(--font-mono); font-size:0.68rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); }
  .field-hint{ font-size:0.76rem; color:var(--muted); }
  input[type=text], input[type=date], input[type=email], input[type=password]{
    background:var(--bg-deep); border:1px solid var(--line); border-radius:8px;
    padding:0.65rem 0.8rem; color:var(--text); font-size:1rem; width:100%;
  }
  .btn{
    border:none; border-radius:8px; padding:0.7rem 1.2rem; font-weight:600;
    cursor:pointer; font-size:0.95rem; transition: background .15s;
  }
  .btn-primary{ background:var(--accent); color:#241606; }
  .btn-primary:hover{ background:var(--accent-deep); }
  .btn-ghost{ background:transparent; border:1px solid var(--line); color:var(--text); }
  .btn-ghost:hover{ border-color:var(--muted); }
  .btn-block{ width:100%; }
  .form-error{ color:var(--danger); font-size:0.85rem; margin:-4px 0 14px; }
  .form-success{ color:var(--correct); font-size:0.85rem; margin:-4px 0 14px; }

  .puzzle-list{ display:flex; flex-direction:column; gap:8px; margin-top:10px; }
  .puzzle-list h3{ font-family:var(--font-mono); font-size:0.72rem; text-transform:uppercase; letter-spacing:0.1em; color:var(--muted); margin:26px 0 4px; }
  .puzzle-row{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    background:var(--surface); border:1px solid var(--line); border-radius:9px; padding:0.6rem 0.85rem;
  }
  .puzzle-row .pr-left{ display:flex; flex-direction:column; gap:2px; min-width:0; }
  .puzzle-row .pr-date{ font-family:var(--font-mono); font-size:0.74rem; color:var(--muted); }
  .puzzle-row .pr-word{ font-weight:600; letter-spacing:0.04em; overflow:hidden; text-overflow:ellipsis; }
  .row-actions{ display:flex; gap:4px; flex-shrink:0; }
  .row-actions button{ background:none; border:none; color:var(--muted); cursor:pointer; font-size:0.8rem; padding:4px 6px; }
  .row-actions button:hover{ color:var(--text); }
  .row-actions .danger:hover{ color:var(--danger); }
  .admin-empty{ color:var(--muted); font-size:0.88rem; padding:18px 0; text-align:center; }
</style>
</head>
<body>
<div id="app"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, doc, getDoc, setDoc, deleteDoc, collection,
  getDocs, query, orderBy, documentId, limit, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyANoivaFfrkupzdO1VwuNfi4dB6rf4v89Y",
  authDomain: "lamplight-2ad68.firebaseapp.com",
  projectId: "lamplight-2ad68",
  storageBucket: "lamplight-2ad68.firebasestorage.app",
  messagingSenderId: "328914038736",
  appId: "1:328914038736:web:144c082c0240a5c10c53d5"
};

const NEEDS_SETUP = firebaseConfig.apiKey.startsWith("PASTE");

const MAX_GUESSES = 6;
const MIN_LEN = 3;
const MAX_LEN = 12;

let db, auth;
let currentUser = null;

// ---- play state ----
let loadedDate = null;
let puzzle = null;          
let guesses = [];
let currentGuess = "";
let gameStatus = "loading"; 
let letterStatuses = {};
let animatedRows = new Set();
let shakePending = false;
let winFlashPending = false;

// ---- admin state ----
let adminPuzzles = [];
let adminListLoading = false;
let loginError = "";
let adminFormError = "";
let adminFormSuccess = "";

const app = document.getElementById("app");

/* ============ UTILITIES ============ */
function pad(n){ return String(n).padStart(2, "0"); }
function todayStr(){
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}

function formatNice(dateStr){
  // FIX: Safari crashes when parsing YYYY-MM-DD. Slashes fix it.
  const safeDateStr = dateStr.replace(/-/g, "/");
  const d = new Date(safeDateStr + " 00:00:00");
  const weekday = d.toLocaleDateString("en-US", { weekday: "long" });
  const monthDay = d.toLocaleDateString("en-US", { month: "short", day: "numeric" });
  return `${weekday.toUpperCase()} · ${monthDay.toUpperCase()}`;
}

function cleanWord(raw){
  return (raw || "").toUpperCase().replace(/[^A-Z]/g, "");
}
function tileFontRem(len){
  const size = Math.max(0.8, 1.7 - (len - 4) * 0.1);
  return size.toFixed(2) + "rem";
}
function evaluateGuess(guess, answer){
  const len = answer.length;
  const result = new Array(len).fill("absent");
  const counts = {};
  for (let i = 0; i < len; i++){
    if (guess[i] === answer[i]) result[i] = "correct";
    else counts[answer[i]] = (counts[answer[i]] || 0) + 1;
  }
  for (let i = 0; i < len; i++){
    if (result[i] === "correct") continue;
    const ch = guess[i];
    if (counts[ch] > 0){ result[i] = "present"; counts[ch]--; }
  }
  return result;
}
function rankOf(status){ return { correct:3, present:2, absent:1 }[status] || 0; }
function recomputeLetterStatuses(){
  letterStatuses = {};
  for (const g of guesses){
    const res = evaluateGuess(g, puzzle.word);
    for (let i = 0; i < g.length; i++){
      const ch = g[i], st = res[i];
      if (rankOf(st) > rankOf(letterStatuses[ch])) letterStatuses[ch] = st;
    }
  }
}
function localKey(dateStr){ return `lamplight_${dateStr}`; }

// FIX: Wrap storage in try-catch to prevent crashes in iOS private mode
function getLocalState(key){
  try { return localStorage.getItem(key); } 
  catch(e) { return null; }
}
function saveLocalState(){
  try { localStorage.setItem(localKey(loadedDate), JSON.stringify({ guesses, status: gameStatus })); } 
  catch(e) { console.warn("Could not save to localStorage."); }
}

/* ============ GAME ============ */
async function enterPlayScreen(){
  const dateStr = todayStr();
  if (loadedDate === dateStr && gameStatus !== "loading") { renderBoardView(); return; }

  gameStatus = "loading";
  loadedDate = dateStr;
  guesses = [];
  currentGuess = "";
  animatedRows = new Set();
  letterStatuses = {};
  puzzle = null;

  try {
    const snap = await getDoc(doc(db, "puzzles", dateStr));
    if (!snap.exists()){
      gameStatus = "empty";
      renderBoardView();
      return;
    }
    const data = snap.data();
    const word = cleanWord(data.word);
    puzzle = { word, length: word.length };

    const saved = getLocalState(localKey(dateStr));
    if (saved){
      const parsed = JSON.parse(saved);
      guesses = parsed.guesses || [];
      gameStatus = parsed.status || "playing";
      animatedRows = new Set(guesses.map((_, i) => i));
    } else {
      gameStatus = "playing";
    }
    recomputeLetterStatuses();
  } catch (err){
    console.error(err);
    gameStatus = "error";
  }
  renderBoardView();
}

function addLetter(ch){
  if (gameStatus !== "playing") return;
  if (currentGuess.length >= puzzle.length) return;
  currentGuess += ch;
  renderBoardView();
}
function removeLetter(){
  if (gameStatus !== "playing") return;
  currentGuess = currentGuess.slice(0, -1);
  renderBoardView();
}
function submitGuess(){
  if (gameStatus !== "playing") return;
  if (currentGuess.length !== puzzle.length){
    shakePending = true;
    renderBoardView();
    return;
  }
  guesses.push(currentGuess);
  recomputeLetterStatuses();

  if (currentGuess === puzzle.word){
    gameStatus = "won";
    winFlashPending = true;
  } else if (guesses.length >= MAX_GUESSES){
    gameStatus = "lost";
  }
  currentGuess = "";
  saveLocalState();
  renderBoardView();
}

function handleVirtualKey(key){
  if (key === "ENTER") submitGuess();
  else if (key === "BACK") removeLetter();
  else addLetter(key);
}

document.addEventListener("keydown", (e) => {
  if (location.hash === "#admin") return;
  if (gameStatus !== "playing") return;
  const tag = (e.target.tagName || "").toLowerCase();
  if (tag === "input" || tag === "textarea") return;
  if (/^[a-zA-Z]$/.test(e.key)) addLetter(e.key.toUpperCase());
  else if (e.key === "Backspace") removeLetter();
  else if (e.key === "Enter") submitGuess();
});

/* ============ RENDER: PLAY / EMPTY ============ */
const KB_ROWS = ["QWERTYUIOP", "ASDFGHJKL", "ZXCVBNM"];

function tileHtml(letter, status, len, extraClass){
  const cls = ["tile"];
  if (letter) cls.push("filled");
  if (status) cls.push(status);
  if (extraClass) cls.push(extraClass);
  return `<div class="${cls.join(" ")}" style="font-size:${tileFontRem(len)}">${letter || ""}</div>`;
}

function boardHtml(){
  const len = puzzle.length;
  const rows = [];
  for (let r = 0; r < MAX_GUESSES; r++){
    let rowHtml = "";
    let rowClass = "row";
    if (r < guesses.length){
      const g = guesses[r];
      const res = evaluateGuess(g, puzzle.word);
      const justRevealed = !animatedRows.has(r);
      if (justRevealed) animatedRows.add(r);
      for (let i = 0; i < len; i++){
        rowHtml += tileHtml(g[i], res[i], len, justRevealed ? "pop" : "");
      }
    } else if (r === guesses.length && gameStatus === "playing"){
      rowClass += " active";
      if (shakePending) rowClass += " shake";
      for (let i = 0; i < len; i++) rowHtml += tileHtml(currentGuess[i] || "", "", len, "");
    } else {
      for (let i = 0; i < len; i++) rowHtml += tileHtml("", "", len, "");
    }
    rows.push(`<div class="${rowClass}" style="--len:${len}">${rowHtml}</div>`);
  }
  shakePending = false;
  return rows.join("");
}

function keyboardHtml(){
  const keyCls = (ch) => {
    const st = letterStatuses[ch];
    return st ? `key ${st}` : "key";
  };
  let html = `<div class="keyboard">`;
  KB_ROWS.forEach((row, idx) => {
    html += `<div class="kb-row">`;
    if (idx === 2) html += `<button type="button" class="key wide" data-key="ENTER">ENTER</button>`;
    for (const ch of row){
      html += `<button type="button" class="${keyCls(ch)}" data-key="${ch}">${ch}</button>`;
    }
    if (idx === 2) html += `<button type="button" class="key wide" data-key="BACK">⌫</button>`;
    html += `</div>`;
  });
  html += `</div>`;
  return html;
}

function bannerHtml(){
  if (gameStatus === "won"){
    return `<div class="banner win">Got it in ${guesses.length} ${guesses.length === 1 ? "guess" : "guesses"} — tonight's word was <strong>${puzzle.word}</strong>.</div>`;
  }
  if (gameStatus === "lost"){
    return `<div class="banner lose">Out of guesses tonight. The word was <strong>${puzzle.word}</strong>.</div>`;
  }
  return "";
}

function renderBoardView(){
  if (NEEDS_SETUP){ renderSetupNeeded(); return; }
  if (gameStatus === "loading"){
    app.innerHTML = `<div class="screen"><div class="empty-card"><div class="glyph">🌙</div><p>Loading tonight's word…</p></div></div>`;
    return;
  }
  if (gameStatus === "error"){
    app.innerHTML = `
      <div class="screen">
        ${brandHtml()}
        <div class="empty-card">
          <div class="glyph">🌙</div>
          <h2>Couldn't load tonight's word</h2>
          <p>Check the connection and reload.</p>
        </div>
      </div>
      ${footerLinkHtml()}`;
    return;
  }
  if (gameStatus === "empty"){
    app.innerHTML = `
      <div class="screen">
        ${brandHtml()}
        <div class="empty-card">
          <div class="glyph">🌙</div>
          <h2>No word yet tonight</h2>
          <p>Once tonight's word is set, it'll show up right here.</p>
        </div>
      </div>
      ${footerLinkHtml()}`;
    return;
  }

  const flash = winFlashPending ? "win-flash" : "";
  winFlashPending = false;

  app.innerHTML = `
    <div class="screen">
      ${brandHtml()}
      <div class="board-wrap ${flash}">
        <div class="board">${boardHtml()}</div>
      </div>
      ${bannerHtml()}
      ${keyboardHtml()}
    </div>
    ${footerLinkHtml()}`;
}

function brandHtml(){
  return `
    <div class="brand">
      <div class="brand-mark">🌙</div>
      <h1>Lamplight</h1>
      <p class="tagline">a little word before bed</p>
    </div>
    <div class="date-stamp">${formatNice(loadedDate || todayStr())}</div>`;
}
function footerLinkHtml(){
  return `<button class="footer-link" data-action="go-admin" aria-label="Manage words">⚙</button>`;
}
function renderSetupNeeded(){
  app.innerHTML = `
    <div class="screen">
      ${brandHtml()}
      <div class="setup-card">
        <div class="glyph">🌙</div>
        <h2>One more step</h2>
        <p>This page needs your Firebase project's config pasted into the <code>firebaseConfig</code> object near the top of the file's script, then re-uploaded wherever you're hosting it. See the setup steps shared alongside this file.</p>
      </div>
    </div>`;
}

/* ============ ROUTER ============ */
function route(){
  if (location.hash === "#admin"){
    if (NEEDS_SETUP){ renderSetupNeeded(); return; }
    if (currentUser) renderAdminPanel();
    else renderAdminLogin();
  } else {
    enterPlayScreen();
  }
}
window.addEventListener("hashchange", route);

/* ============ ADMIN: AUTH ============ */
function renderAdminLogin(){
  app.innerHTML = `
    <div class="screen">
      <div class="login-card">
        <h2>Sign in</h2>
        <form id="login-form">
          <div class="field">
            <label class="field-label" for="email-input">Email</label>
            <input type="email" id="email-input" autocomplete="username" required>
          </div>
          <div class="field">
            <label class="field-label" for="password-input">Password</label>
            <input type="password" id="password-input" autocomplete="current-password" required>
          </div>
          ${loginError ? `<p class="form-error">${loginError}</p>` : ""}
          <button type="submit" class="btn btn-primary btn-block">Sign in</button>
        </form>
        <p style="text-align:center;margin-top:16px;">
          <button class="link-btn" data-action="go-play">← Back to tonight's word</button>
        </p>
      </div>
    </div>`;
}
async function doLogin(form){
  loginError = "";
  const email = form.querySelector("#email-input").value.trim();
  const password = form.querySelector("#password-input").value;
  try {
    await signInWithEmailAndPassword(auth, email, password);
    loginError = "";
  } catch (err){
    const code = err && err.code;
    if (code === "auth/invalid-credential" || code === "auth/wrong-password" || code === "auth/user-not-found"){
      loginError = "Wrong email or password.";
    } else {
      loginError = "Couldn't sign in. " + (err.message || "");
    }
    renderAdminLogin();
  }
}

/* ============ ADMIN: PANEL ============ */
async function refreshAdminList(){
  adminListLoading = true;
  renderAdminPanel();
  try {
    const q = query(collection(db, "puzzles"), orderBy(documentId(), "desc"), limit(60));
    const snap = await getDocs(q);
    adminPuzzles = snap.docs.map(d => ({ date: d.id, ...d.data() }));
  } catch (err){
    console.error(err);
    adminPuzzles = [];
  }
  adminListLoading = false;
  renderAdminPanel();
}

function puzzleRowHtml(p){
  const word = cleanWord(p.word);
  return `
    <div class="puzzle-row">
      <div class="pr-left">
        <span class="pr-date">${p.date}</span>
        <span class="pr-word">${word} <span style="color:var(--muted);font-weight:400;">· ${word.length} letters</span></span>
      </div>
      <div class="row-actions">
        <button data-action="admin-edit" data-date="${p.date}" data-word="${word}">Edit</button>
        <button class="danger" data-action="admin-delete" data-date="${p.date}">Delete</button>
      </div>
    </div>`;
}

function renderAdminPanel(){
  const today = todayStr();
  const upcoming = adminPuzzles.filter(p => p.date >= today);
  const past = adminPuzzles.filter(p => p.date < today);

  app.innerHTML = `
    <div class="screen">
      <div class="admin-header">
        <h1>Manage words</h1>
        <button class="link-btn" data-action="admin-logout">Sign out</button>
      </div>

      <form id="puzzle-form">
        <div class="field">
          <label class="field-label" for="date-input">Date</label>
          <input type="date" id="date-input" required>
          <span class="field-hint">Changing the date on an existing word creates a new entry — delete the old one if you're moving it.</span>
        </div>
        <div class="field">
          <label class="field-label" for="word-input">Word</label>
          <input type="text" id="word-input" autocomplete="off" placeholder="e.g. GIRAFFE" required>
          <span class="field-hint" id="word-length-preview">0 letters</span>
        </div>
        ${adminFormError ? `<p class="form-error">${adminFormError}</p>` : ""}
        ${adminFormSuccess ? `<p class="form-success">${adminFormSuccess}</p>` : ""}
        <button type="submit" class="btn btn-primary btn-block">Save word</button>
      </form>

      <h3>Upcoming</h3>
      <div class="puzzle-list">
        ${adminListLoading ? `<p class="admin-empty">Loading…</p>` :
          upcoming.length ? upcoming.slice().reverse().map(puzzleRowHtml).join("") :
          `<p class="admin-empty">Nothing queued up yet.</p>`}
      </div>

      <h3>Past</h3>
      <div class="puzzle-list">
        ${adminListLoading ? "" :
          past.length ? past.map(puzzleRowHtml).join("") :
          `<p class="admin-empty">No past words yet.</p>`}
      </div>

      <p style="text-align:center;margin-top:28px;">
        <button class="link-btn" data-action="go-play">← Back to tonight's word</button>
      </p>
    </div>`;

  const wordInput = document.getElementById("word-input");
  if (wordInput) updateWordLengthPreview(wordInput.value);
}

function updateWordLengthPreview(raw){
  const len = cleanWord(raw).length;
  const el = document.getElementById("word-length-preview");
  if (el) el.textContent = `${len} letter${len === 1 ? "" : "s"}`;
}

async function doSavePuzzle(form){
  adminFormError = "";
  adminFormSuccess = "";
  const dateVal = form.querySelector("#date-input").value;
  const wordVal = cleanWord(form.querySelector("#word-input").value);

  if (!dateVal){ adminFormError = "Pick a date."; renderAdminPanel(); return; }
  if (wordVal.length < MIN_LEN || wordVal.length > MAX_LEN){
    adminFormError = `Words need to be ${MIN_LEN}–${MAX_LEN} letters, letters only.`;
    renderAdminPanel();
    return;
  }
  try {
    await setDoc(doc(db, "puzzles", dateVal), {
      word: wordVal,
      length: wordVal.length,
      updatedAt: serverTimestamp()
    });
    adminFormSuccess = `Saved ${dateVal}.`;
    await refreshAdminList();
  } catch (err){
    console.error(err);
    adminFormError = "Couldn't save. " + (err.message || "");
    renderAdminPanel();
  }
}
async function doDeletePuzzle(dateStr){
  if (!confirm(`Delete the word for ${dateStr}?`)) return;
  try {
    await deleteDoc(doc(db, "puzzles", dateStr));
    await refreshAdminList();
  } catch (err){
    console.error(err);
    alert("Couldn't delete that one. Try again.");
  }
}

/* ============ EVENT DELEGATION ============ */
app.addEventListener("click", (e) => {
  const keyEl = e.target.closest("[data-key]");
  if (keyEl){ handleVirtualKey(keyEl.dataset.key); return; }

  const actionEl = e.target.closest("[data-action]");
  if (!actionEl) return;
  const action = actionEl.dataset.action;

  if (action === "go-admin"){ location.hash = "#admin"; }
  else if (action === "go-play"){ location.hash = ""; }
  else if (action === "admin-logout"){ signOut(auth); }
  else if (action === "admin-edit"){
    const d = document.getElementById("date-input");
    const w = document.getElementById("word-input");
    if (d) d.value = actionEl.dataset.date;
    if (w){ w.value = actionEl.dataset.word; updateWordLengthPreview(w.value); w.focus(); }
    window.scrollTo({ top: 0, behavior: "smooth" });
  }
  else if (action === "admin-delete"){ doDeletePuzzle(actionEl.dataset.date); }
});

app.addEventListener("input", (e) => {
  if (e.target && e.target.id === "word-input") updateWordLengthPreview(e.target.value);
});

app.addEventListener("submit", (e) => {
  e.preventDefault();
  if (e.target.id === "login-form") doLogin(e.target);
  else if (e.target.id === "puzzle-form") doSavePuzzle(e.target);
});

/* ============ INIT ============ */
if (NEEDS_SETUP){
  renderSetupNeeded();
} else {
  const fbApp = initializeApp(firebaseConfig);
  auth = getAuth(fbApp);
  db = getFirestore(fbApp);

  onAuthStateChanged(auth, (user) => {
    currentUser = user;
    if (location.hash === "#admin"){
      if (user){ adminFormError = ""; adminFormSuccess = ""; refreshAdminList(); }
      else renderAdminLogin();
    }
  });

  route();
}
</script>
</body>
</html>
